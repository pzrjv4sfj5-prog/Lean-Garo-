name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (includes dictionary validation + regression suite)
        run: npm run build

      - name: Lint
        run: npx eslint . --ext js,jsx --max-warnings 0
        continue-on-error: true
